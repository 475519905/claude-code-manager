<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"/>
  <title>Claude Manager</title>
  <link rel="icon" type="image/png" href="/icon.png"/>
  <meta name="viewport" content="width=1280"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    #cm-splash {
      position: fixed; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 18px;
      background: #fafaf7; color: #6b6b66;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
      font-size: 13px; letter-spacing: 0.02em;
      transition: opacity .25s ease;
    }
    #cm-splash.hide { opacity: 0; pointer-events: none; }
    #cm-splash .cm-ring {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid rgba(0,0,0,0.08);
      border-top-color: #1f1f1c;
      animation: cm-spin 0.9s linear infinite;
    }
    @keyframes cm-spin { to { transform: rotate(360deg); } }
    @media (prefers-color-scheme: dark) {
      #cm-splash { background: #1a1a18; color: #9a9a92; }
      #cm-splash .cm-ring { border-color: rgba(255,255,255,0.12); border-top-color: #e8e8e2; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="cm-splash">
    <div class="cm-ring"></div>
    <div>Claude Manager · 加载中…</div>
  </div>

  <!-- Local vendor: React 18 (prod, minified) — replaces unpkg fetches. -->
  <script src="vendor/react.production.min.js"></script>
  <script src="vendor/react-dom.production.min.js"></script>
  <script src="vendor/marked.min.js"></script>

  <!-- Pre-compiled app (build_web.py esbuild pass) — replaces runtime Babel. -->
  <script src="data.js"></script>
  <script src="app.bundle.js"></script>
</body>
</html>
